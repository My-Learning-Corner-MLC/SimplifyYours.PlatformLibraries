name: Platform Event Packages

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - events-v*
  workflow_dispatch:
    inputs:
      packageVersion:
        required: true
        description: Package version to publish

permissions:
  contents: read
  packages: write

jobs:
  build-pack:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "PACKAGE_VERSION=${GITHUB_REF_NAME#events-v}" >> "$GITHUB_ENV"
          elif [[ -n "${{ github.event.inputs.packageVersion }}" ]]; then
            echo "PACKAGE_VERSION=${{ github.event.inputs.packageVersion }}" >> "$GITHUB_ENV"
          else
            echo "PACKAGE_VERSION=0.0.0-ci.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Restore
        run: dotnet restore SimplifyYours.Event.PlatformLibraries.sln

      - name: Build
        run: dotnet build SimplifyYours.Event.PlatformLibraries.sln --configuration Release --no-restore

      - name: Pack
        run: dotnet pack SimplifyYours.Event.PlatformLibraries.sln --configuration Release --no-build -p:PackageVersion=${PACKAGE_VERSION} --output artifacts

      - name: Add GitHub Packages source
        if: startsWith(github.ref, 'refs/tags/events-v') || github.event_name == 'workflow_dispatch'
        run: dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --name github --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text

      - name: Publish packages
        if: startsWith(github.ref, 'refs/tags/events-v') || github.event_name == 'workflow_dispatch'
        run: dotnet nuget push "artifacts/*.nupkg" --source github --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
